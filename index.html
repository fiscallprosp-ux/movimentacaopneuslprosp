<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Pneus - LPROSP</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lprosp-blue': '#1E3A8A',
                        'lprosp-dark': '#0F172A',
                    },
                    fontFamily: {
                        'heading': ['Montserrat', 'sans-serif'],
                        'body': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Estilos Customizados & Drag and Drop -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
        }

        /* Drag and Drop Custom Styles */
        .draggable-tire {
            cursor: grab;
            user-select: none;
            touch-action: none;
        }
        .draggable-tire:active {
            cursor: grabbing;
        }
        .drop-zone-active {
            border-color: #3B82F6 !important;
            background-color: rgba(59, 130, 246, 0.15) !important;
            transform: scale(1.02);
        }
        .tire-action-zone {
            transition: all 0.2s ease;
        }
        .tire-action-zone.drag-over {
            border-color: #EF4444 !important;
            background-color: #FEF2F2 !important;
        }

        /* Scrollbar Personalizado */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #F1F5F9;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }
    </style>

    <!-- Firebase App & Realtime Database SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col bg-slate-50">

    <!-- NAV BAR SUPERIOR -->
    <header class="bg-slate-900 text-white border-b border-slate-800 sticky top-0 z-30 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo & Título -->
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 text-white p-2 rounded-xl flex items-center justify-center">
                        <i class="fas fa-truck-moving text-lg"></i>
                    </div>
                    <div>
                        <h1 class="font-black font-heading text-base tracking-wide text-white uppercase">Gestão de Pneus</h1>
                        <p class="text-[10px] text-slate-400 font-medium">LPROSP Logistics</p>
                    </div>
                </div>

                <!-- Abas de Navegação -->
                <nav class="flex items-center gap-1 bg-slate-800/80 p-1.5 rounded-xl border border-slate-700/50">
                    <button id="tab-carretas" onclick="switchTab('carretas')" 
                            class="px-4 py-1.5 rounded-lg text-xs font-bold font-heading transition-all duration-150 flex items-center gap-2 bg-blue-600 text-white shadow-sm">
                        <i class="fas fa-truck-front text-xs"></i>
                        <span>Carretas / Pátio</span>
                    </button>
                    <button id="tab-pneus" onclick="switchTab('pneus')" 
                            class="px-4 py-1.5 rounded-lg text-xs font-bold font-heading transition-all duration-150 flex items-center gap-2 text-slate-400 hover:text-white">
                        <i class="fas fa-circle-notch text-xs"></i>
                        <span>Estoque de Pneus</span>
                    </button>
                </nav>

                <!-- Botões de Ação Global -->
                <div class="flex items-center gap-2">
                    <button onclick="showAddPneuModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-2 rounded-xl text-xs font-bold font-heading flex items-center gap-1.5 transition shadow-sm">
                        <i class="fas fa-plus"></i>
                        <span class="hidden sm:inline">Cadastrar Pneu</span>
                    </button>
                    <button onclick="showAddCarretaModal()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 px-3 py-2 rounded-xl text-xs font-bold font-heading flex items-center gap-1.5 transition">
                        <i class="fas fa-truck-trailer"></i>
                        <span class="hidden sm:inline">Nova Carreta</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- BARRA SUB-HEADER (BUSCA E METRICAS RÁPIDAS) -->
    <div class="bg-white border-b border-slate-200 py-3 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row gap-4 items-center justify-between">
            <!-- Barra de Pesquisa -->
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-3 top-3 text-slate-400 text-xs"></i>
                <input type="text" id="global-search" oninput="handleSearch(this.value)" 
                       placeholder="Buscar por placa, modelo ou nº de fogo..." 
                       class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-9 pr-4 py-2 text-xs focus:outline-none focus:border-blue-600 focus:bg-white transition">
            </div>

            <!-- Contadores e Métricas -->
            <div class="flex items-center gap-6 w-full md:w-auto justify-between md:justify-end text-xs">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                    <span class="text-slate-500 font-medium">Em Uso:</span>
                    <strong id="stat-em-uso" class="font-bold text-slate-800">0</strong>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-blue-500"></span>
                    <span class="text-slate-500 font-medium">Estoque:</span>
                    <strong id="stat-estoque" class="font-bold text-slate-800">0</strong>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
                    <span class="text-slate-500 font-medium">Reforma:</span>
                    <strong id="stat-reforma" class="font-bold text-slate-800">0</strong>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div id="main-container">
            <!-- O conteúdo renderiza dinamicamente via JS -->
            <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                <i class="fas fa-circle-notch fa-spin text-3xl mb-3 text-blue-600"></i>
                <p class="text-xs font-bold font-heading text-slate-500">Carregando dados do pátio...</p>
            </div>
        </div>
    </main>

    <!-- CONTAINER DE MODAIS -->
    <div id="modal-container" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div id="modal-content" class="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden border border-slate-100 transform transition-all">
            <!-- Conteúdo injetado via JS -->
        </div>
    </div>

    <!-- CONTAINER DE TOASTS/NOTIFICAÇÕES -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- SCRIPT DA APLICAÇÃO -->
    <script src="js/app.js"></script>
</body>
</html>
