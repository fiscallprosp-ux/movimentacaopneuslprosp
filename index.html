<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PneuControl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-truck-front text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight">PneuControl</h1>
                        <p class="text-xs text-zinc-500">Gestão de Carretas</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 p-4 space-y-1" id="sidebar-nav">
                <button onclick="navigate('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition text-left text-zinc-400 hover:bg-zinc-800 hover:text-white">
                    <i class="fas fa-chart-pie w-5"></i> Dashboard
                </button>
                <button onclick="navigate('carretas')" id="nav-carretas" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition text-left text-zinc-400 hover:bg-zinc-800 hover:text-white">
                    <i class="fas fa-truck-trailer w-5"></i> Carretas / Pátio
                </button>
                <button onclick="navigate('pneus')" id="nav-pneus" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition text-left text-zinc-400 hover:bg-zinc-800 hover:text-white">
                    <i class="fas fa-circle-dot w-5"></i> Estoque de Pneus
                </button>
            </nav>
            
            <div class="p-4 border-t border-zinc-800 text-xs text-zinc-500 flex items-center justify-between">
                <span>Dados salvos localmente</span>
                <span class="inline-block w-2 h-2 rounded-full bg-emerald-500"></span>
            </div>
        </div>
        
        <!-- Main -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <h2 id="page-title" class="text-2xl font-semibold">Dashboard</h2>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <input id="global-search" type="text" placeholder="Buscar fogo ou placa..." onkeyup="handleSearch(this.value)"
                               class="bg-zinc-800 border border-zinc-700 rounded-full py-2 px-5 pl-10 w-80 text-sm focus:outline-none focus:border-orange-500 transition">
                        <i class="fas fa-search absolute left-4 top-3 text-zinc-500 text-sm"></i>
                    </div>
                    <button onclick="showAddTireModal()" 
                            class="flex items-center gap-2 bg-orange-600 hover:bg-orange-700 px-4 py-2 rounded-xl text-sm font-medium transition">
                        <i class="fas fa-plus"></i>
                        <span>Novo Pneu</span>
                    </button>
                    <button onclick="showAddCarretaModal()" 
                            class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 px-4 py-2 rounded-xl text-sm font-medium transition">
                        <i class="fas fa-plus"></i>
                        <span>Nova Carreta</span>
                    </button>
                </div>
            </header>
            
            <main class="flex-1 overflow-auto p-8" id="main-content"></main>
        </div>
    </div>

    <!-- Modal Base -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div id="modal-content" class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl"></div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
