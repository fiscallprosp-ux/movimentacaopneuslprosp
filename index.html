<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-PROSP • Gestão de Pneus</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lprosp-blue': '#1E3A8A',
                        'lprosp-blue-light': '#EFF6FF',
                        'lprosp-green': '#059669',
                        'lprosp-red': '#DC2626'
                    },
                    fontFamily: {
                        'heading': ['Montserrat', 'sans-serif'],
                        'sans': ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Scripts (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800 min-h-screen">

    <!-- CONTAINER DE NOTIFICAÇÕES (TOAST) -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-xl w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-black font-heading text-lprosp-blue tracking-wider">L-PROSP</h1>
                <p class="text-xs text-slate-400 font-bold font-heading uppercase mt-1">Gestão de Frota e Pneus</p>
            </div>
            
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1 font-heading">USUÁRIO OU EMAIL</label>
                    <input type="text" id="login-email" placeholder="usuario" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:outline-none focus:border-lprosp-blue" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1 font-heading">SENHA</label>
                    <input type="password" id="login-password" placeholder="••••••••" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:outline-none focus:border-lprosp-blue" required>
                </div>
                <div id="login-error" class="hidden text-xs text-lprosp-red font-bold text-center bg-red-50 p-3 rounded-xl border border-red-200"></div>
                <button type="submit" class="w-full py-3 bg-lprosp-blue hover:bg-blue-900 text-white rounded-xl font-bold font-heading text-sm transition shadow-lg">ENTRAR NO SISTEMA</button>
            </form>
        </div>
    </div>

    <!-- TELA PRINCIPAL (APPLICAÇÃO) -->
    <div id="app-screen" class="hidden min-h-screen flex flex-col">
        <!-- HEADER -->
        <header class="bg-white border-b border-slate-200 sticky top-0 z-30 px-6 py-4 flex justify-between items-center shadow-sm">
            <div>
                <h1 class="text-xl font-black font-heading text-lprosp-blue">L-PROSP</h1>
                <span id="user-display-email" class="text-[10px] font-bold font-heading text-slate-400 block"></span>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="showAddTireModal()" class="px-4 py-2 bg-lprosp-blue text-white rounded-xl text-xs font-bold font-heading hover:bg-blue-900 transition flex items-center gap-1.5 shadow-sm">
                    <i class="fas fa-plus"></i> Novo Pneu
                </button>
                <button onclick="showAddCarretaModal()" class="px-4 py-2 bg-lprosp-red text-white rounded-xl text-xs font-bold font-heading hover:bg-red-700 transition flex items-center gap-1.5 shadow-sm">
                    <i class="fas fa-truck-front"></i> Nova Carreta
                </button>
                <button onclick="handleLogout()" title="Sair" class="p-2 text-slate-400 hover:text-lprosp-red transition">
                    <i class="fas fa-right-from-bracket text-lg"></i>
                </button>
            </div>
        </header>

        <!-- NAVEGAÇÃO -->
        <nav id="sidebar-nav" class="bg-white border-b border-slate-200 px-6 py-2.5 flex gap-2">
            <button id="nav-dashboard" onclick="navigate('dashboard')" class="px-6 py-2.5 rounded-xl text-sm font-bold font-heading transition shadow-sm bg-lprosp-blue text-white">Dashboard</button>
            <button id="nav-carretas" onclick="navigate('carretas')" class="px-6 py-2.5 rounded-xl text-sm font-bold font-heading transition bg-white text-slate-600 hover:bg-slate-100 border border-slate-200">Carretas / Pátio</button>
            <button id="nav-pneus" onclick="navigate('pneus')" class="px-6 py-2.5 rounded-xl text-sm font-bold font-heading transition bg-white text-slate-600 hover:bg-slate-100 border border-slate-200">Estoque de Pneus</button>
        </nav>

        <!-- CONTEÚDO DINÂMICO -->
        <main id="main-content" class="flex-1 p-6 max-w-7xl w-full mx-auto"></main>
    </div>

    <!-- MODAL GENÉRICO -->
    <div id="modal" class="hidden fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-3xl shadow-2xl w-full max-w-lg border border-slate-100 overflow-hidden"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
