<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Pneus e Frota</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .font-heading { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <!-- CABEÇALHO PRINCIPAL -->
    <header id="app-header" class="hidden bg-white border-t-4 border-red-600 border-b border-slate-200 shadow-sm relative z-20">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            
            <!-- Logo e Título -->
            <div class="flex items-center gap-4">
                <div class="h-12 flex items-center justify-center">
                    <img src="logo.jpg" alt="L-Prosp" class="max-h-full w-auto object-contain" onerror="this.onerror=null; this.parentNode.innerHTML='<i class=\"fas fa-truck text-3xl text-[#1e3a8a]\"></i>';">
                </div>
                <div>
                    <h1 class="text-xl font-black text-[#1e3a8a] tracking-tight uppercase">L-PROSP LOGÍSTICA</h1>
                    <p class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Gestão de Pneus e Frota</p>
                </div>
            </div>

            <!-- Abas Centrais -->
            <div class="flex bg-slate-50 p-1 rounded-lg border border-slate-200">
                <button id="tab-carretas" onclick="switchTab('carretas')" class="px-4 py-1.5 rounded-md text-xs font-bold transition-all duration-150 flex items-center gap-2 bg-[#1e3a8a] text-white shadow-sm">
                    <i class="fas fa-truck"></i> Veículos / Pátio
                </button>
                <button id="tab-pneus" onclick="switchTab('pneus')" class="px-4 py-1.5 rounded-md text-xs font-bold transition-all duration-150 flex items-center gap-2 text-slate-600 hover:bg-white">
                    <i class="fas fa-boxes-stacked"></i> Estoque de Pneus
                </button>
            </div>

            <!-- Ações e Logout -->
            <div class="flex items-center gap-3">
                <button onclick="showAddPneuModal()" class="bg-white border border-[#1e3a8a] text-[#1e3a8a] hover:bg-blue-50 px-3 py-1.5 rounded-lg text-xs font-bold transition shadow-sm flex items-center gap-2">
                    <i class="fas fa-plus"></i> Cadastrar Pneu
                </button>
                
                <button onclick="showAddVeiculoModal()" class="bg-[#1e3a8a] hover:bg-blue-900 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition shadow-sm flex items-center gap-2">
                    Novo Veículo
                </button>

                <button onclick="handleLogout()" class="bg-red-50 text-red-600 hover:bg-red-600 hover:text-white border border-red-100 p-2 rounded-lg transition shadow-sm ml-2" title="Sair do Sistema">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- SUBHEADER -->
    <div id="app-subheader" class="hidden bg-white border-b border-slate-200 shadow-sm relative z-10 mb-6">
        <div class="max-w-7xl mx-auto px-4 h-12 flex items-center justify-between">
            
            <div class="relative w-96">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input type="text" placeholder="Buscar por placa, modelo ou nº de fogo..." oninput="handleSearch(this.value)"
                       class="w-full bg-slate-50 border border-slate-200 rounded-full pl-9 pr-4 py-1.5 text-xs text-slate-800 focus:outline-none focus:border-[#1e3a8a] focus:bg-white transition shadow-inner">
            </div>

            <div class="flex items-center gap-6 text-xs font-bold text-slate-500">
                <div class="flex items-center gap-1.5">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-sm"></span> Em Uso: <span id="stat-em-uso" class="text-slate-800 ml-1">0</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="w-2.5 h-2.5 rounded-full bg-[#1e3a8a] shadow-sm"></span> Estoque: <span id="stat-estoque" class="text-slate-800 ml-1">0</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="w-2.5 h-2.5 rounded-full bg-amber-500 shadow-sm"></span> Reforma: <span id="stat-reforma" class="text-slate-800 ml-1">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <main class="max-w-7xl mx-auto px-4 pb-12">
        <div id="main-container"></div>
    </main>

    <!-- MODAIS E TOASTS -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col items-end"></div>
    <div id="modal-container" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden" id="modal-content"></div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Script da Aplicação -->
    <script src="app.js"></script>
</body>
</html>
